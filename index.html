<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dia 1: Quebrando a Rotina - Respira</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #F5F4F0; --bg-card: #FFFFFF; --bg-dark: #111111;
            --accent-gold: #C29B62; --text-main: #111111; --text-light: #5A5A58;
            --border-color: #DCD7CD; --radius-lg: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            /* Ajuste responsivo para altura no mobile */
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* Permite scroll se necessário */
        }
        
        .app-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px; /* Padding maior para garantir respiro ao rolar */
        }

        .screen { 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hidden { display: none; opacity: 0; transform: translateY(10px); }
        
        /* UI Elements */
        .badge { display: inline-block; padding: 6px 16px; background: var(--bg-dark); color: var(--accent-gold); border-radius: 50px; font-size: 0.75rem; font-weight: 700; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 15px; letter-spacing: -0.5px; }
        .desc { color: var(--text-light); margin-bottom: 30px; font-size: 0.95rem; }
        
        input { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid var(--border-color); font-size: 1rem; text-align: center; margin-bottom: 20px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--accent-gold); }
        
        .btn-primary { width: 100%; padding: 18px; background: var(--bg-dark); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.98); }
        
        /* Player */
        .visualizer { 
            width: 160px; height: 160px; background: white; border-radius: 50%; 
            margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; 
            position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }
        .visualizer.pulse::after { 
            content: ''; position: absolute; width: 100%; height: 100%; 
            border: 2px solid var(--accent-gold); border-radius: 50%; 
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
        
        .player-status { font-size: 0.75rem; color: var(--accent-gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; }
        .player-card { background: white; padding: 25px; border-radius: var(--radius-lg); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        .progress-container { width: 100%; height: 6px; background: #EEE; border-radius: 3px; margin-bottom: 12px; cursor: pointer; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-gold); border-radius: 3px; transition: width 0.1s linear; }
        
        .time-box { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-light); margin-bottom: 25px; }
        
        .play-btn { 
            width: 65px; height: 65px; background: var(--bg-dark); color: white; 
            border-radius: 50%; border: none; font-size: 1.4rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; margin: 0 auto; 
            transition: 0.3s;
        }
        .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        footer { padding: 25px; text-align: center; font-size: 0.75rem; color: #AAA; }

        /* Ajuste para telas muito pequenas */
        @media (max-height: 600px) {
            .app-wrapper { padding: 20px 20px; }
            .visualizer { width: 120px; height: 120px; margin-bottom: 15px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <main class="app-wrapper">
        <!-- TELA 1: LOGIN -->
        <section id="login-screen" class="screen">
            <span class="badge">Dia 1</span>
            <h1>Quebrando a Rotina</h1>
            <p class="desc">Inicie a desprogramação dos gatilhos emocionais da nicotina.</p>
            <input type="text" id="nameInput" placeholder="Seu primeiro nome" autocomplete="given-name">
            <button class="btn-primary" onclick="initExperience()">Iniciar Sessão</button>
        </section>

        <!-- TELA 2: PLAYER -->
        <section id="player-screen" class="screen hidden">
            <p class="player-status" id="status-label">Preparando Ambiente...</p>
            <div class="visualizer pulse" id="viz">
                <i class="fas fa-leaf" style="font-size: 2.2rem; color: var(--accent-gold);"></i>
            </div>
            
            <div class="player-card">
                <div class="progress-container" id="progContainer">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="time-box">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">18:00</span>
                </div>
                <button class="play-btn" id="playBtn" disabled>
                    <i class="fas fa-spinner fa-spin" id="playIcon"></i>
                </button>
            </div>
            <p style="margin-top: 30px; font-size: 0.85rem; color: var(--text-light); font-weight: 500;" id="sessionUser"></p>
        </section>
    </main>

    <footer>
        &copy; 2026 Plataforma Respira. Experiência de Hipnoterapia Digital.
    </footer>

    <script>
        const MAIN_AUDIO_URL = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
        const mainAudio = new Audio(MAIN_AUDIO_URL);
        let introAudio = null;
        let activeAudio = null;

        async function initExperience() {
            const name = document.getElementById('nameInput').value.trim();
            if(!name) return alert("Por favor, digite seu nome.");

            // Transição de tela
            document.getElementById('login-screen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('player-screen').style.display = 'block';
                setTimeout(() => document.getElementById('player-screen').classList.remove('hidden'), 50);
            }, 500);

            document.getElementById('sessionUser').innerText = `Sessão para ${name}`;

            try {
                const response = await fetch(`/api/ai?name=${name}`);
                const blob = await response.blob();
                introAudio = new Audio(URL.createObjectURL(blob));
                
                introAudio.onended = () => startMainProtocol();
                playIntro();
            } catch (err) {
                console.warn("Erro no TTS, iniciando protocolo direto.");
                startMainProtocol();
            }
        }

        function playIntro() {
            activeAudio = introAudio;
            document.getElementById('status-label').innerText = "Introdução Personalizada";
            syncAudio(introAudio);
            introAudio.play().catch(e => console.log("Aguardando interação"));
            updateUI(true);
        }

        function startMainProtocol() {
            activeAudio = mainAudio;
            document.getElementById('status-label').innerText = "Protocolo Principal: Dia 1";
            syncAudio(mainAudio);
            mainAudio.play();
            updateUI(true);
        }

        function syncAudio(audio) {
            audio.ontimeupdate = () => {
                const prog = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressBar').style.width = (prog || 0) + '%';
                
                const m = Math.floor(audio.currentTime / 60);
                const s = Math.floor(audio.currentTime % 60);
                document.getElementById('currentTime').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                
                if(!isNaN(audio.duration)) {
                    const tm = Math.floor(audio.duration / 60);
                    const ts = Math.floor(audio.duration % 60);
                    document.getElementById('totalTime').innerText = `${tm}:${ts < 10 ? '0'+ts : ts}`;
                }
            };
        }

        function updateUI(playing) {
            const btn = document.getElementById('playBtn');
            const icon = document.getElementById('playIcon');
            btn.disabled = false;
            icon.className = playing ? 'fas fa-pause' : 'fas fa-play';
        }

        document.getElementById('playBtn').onclick = () => {
            if(!activeAudio) return;
            if(activeAudio.paused) {
                activeAudio.play();
                updateUI(true);
            } else {
                activeAudio.pause();
                updateUI(false);
            }
        };

        // Seek funcional
        document.getElementById('progContainer').onclick = (e) => {
            if(!activeAudio || isNaN(activeAudio.duration)) return;
            const percent = e.offsetX / e.currentTarget.offsetWidth;
            activeAudio.currentTime = percent * activeAudio.duration;
        };
    </script>
</body>
</html>
