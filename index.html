<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dia 1: Quebrando a Rotina - Respira</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #F5F4F0; --bg-card: #FFFFFF; --bg-dark: #111111;
            --accent-gold: #C29B62; --text-main: #111111; --text-light: #5A5A58;
            --border-color: #DCD7CD; --radius-lg: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .screen { width: 100%; max-width: 400px; text-align: center; transition: all 0.5s ease; }
        .hidden { display: none; opacity: 0; }
        
        /* Identidade Visual */
        .badge { display: inline-block; padding: 6px 16px; background: var(--bg-dark); color: var(--accent-gold); border-radius: 50px; font-size: 0.75rem; font-weight: 700; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 15px; }
        .desc { color: var(--text-light); margin-bottom: 30px; }
        
        input { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid var(--border-color); font-size: 1rem; text-align: center; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--accent-gold); }
        
        .btn-primary { width: 100%; padding: 18px; background: var(--bg-dark); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }
        
        /* Player Design */
        .visualizer { width: 180px; height: 180px; background: white; border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .visualizer.pulse::after { content: ''; position: absolute; width: 100%; height: 100%; border: 2px solid var(--accent-gold); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
        
        .player-status { font-size: 0.8rem; color: var(--accent-gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .player-card { background: white; padding: 30px; border-radius: var(--radius-lg); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .progress-container { width: 100%; height: 6px; background: #EEE; border-radius: 3px; margin-bottom: 10px; position: relative; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-gold); }
        .time-box { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-light); margin-bottom: 20px; }
        .play-btn { width: 60px; height: 60px; background: var(--bg-dark); color: white; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    </style>
</head>
<body>

    <main class="container">
        <!-- TELA DE LOGIN -->
        <section id="login-screen" class="screen">
            <span class="badge">Dia 1</span>
            <h1>Quebrando a Rotina</h1>
            <p class="desc">Prepare sua mente para uma nova percepção de liberdade.</p>
            <input type="text" id="nameInput" placeholder="Seu primeiro nome">
            <button class="btn-primary" onclick="initExperience()">Iniciar Sessão</button>
        </section>

        <!-- TELA DE PLAYER -->
        <section id="player-screen" class="screen hidden">
            <p class="player-status" id="status-label">Preparando Ambiente...</p>
            <div class="visualizer pulse" id="viz">
                <i class="fas fa-headphones" style="font-size: 2.5rem; color: var(--accent-gold);"></i>
            </div>
            
            <div class="player-card">
                <div class="progress-container">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="time-box">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">18:00</span>
                </div>
                <button class="play-btn" id="playBtn" disabled>
                    <i class="fas fa-spinner fa-spin" id="playIcon"></i>
                </button>
            </div>
            <p style="margin-top: 25px; font-size: 0.9rem; color: var(--text-light);" id="sessionUser"></p>
        </section>
    </main>

    <script>
        // Configurações de Áudio
        const MAIN_AUDIO_URL = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'; // Substituir pela sua URL de 18min
        const mainAudio = new Audio(MAIN_AUDIO_URL);
        let introAudio = null;
        let activeAudio = null;

        async function initExperience() {
            const name = document.getElementById('nameInput').value;
            if(!name) return alert("Por favor, digite seu nome.");

            // Troca de tela
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('player-screen').classList.remove('hidden');
            document.getElementById('sessionUser').innerText = `Sessão personalizada para ${name}`;

            try {
                // 1. Busca Áudio Personalizado (API)
                const response = await fetch(`/api/ai?name=${name}`);
                const blob = await response.blob();
                const introUrl = URL.createObjectURL(blob);
                introAudio = new Audio(introUrl);
                
                // 2. Configura a fila: Quando a intro acabar, começa o principal
                introAudio.onended = () => {
                    startMainProtocol();
                };

                // Inicia a Intro
                playIntro();

            } catch (err) {
                console.error("Erro ao carregar sessão:", err);
                startMainProtocol(); // Fallback caso a API falhe
            }
        }

        function playIntro() {
            activeAudio = introAudio;
            document.getElementById('status-label').innerText = "Introdução Personalizada";
            setupAudioListeners(introAudio);
            introAudio.play();
            updatePlayButton(true);
        }

        function startMainProtocol() {
            activeAudio = mainAudio;
            document.getElementById('status-label').innerText = "Protocolo Principal: Dia 1";
            setupAudioListeners(mainAudio);
            mainAudio.play();
            updatePlayButton(true);
        }

        function setupAudioListeners(audioObj) {
            audioObj.ontimeupdate = () => {
                const prog = (audioObj.currentTime / audioObj.duration) * 100;
                document.getElementById('progressBar').style.width = prog + '%';
                
                const m = Math.floor(audioObj.currentTime / 60);
                const s = Math.floor(audioObj.currentTime % 60);
                document.getElementById('currentTime').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                
                // Atualiza tempo total se disponível
                if(!isNaN(audioObj.duration)) {
                    const tm = Math.floor(audioObj.duration / 60);
                    const ts = Math.floor(audioObj.duration % 60);
                    document.getElementById('totalTime').innerText = `${tm}:${ts < 10 ? '0'+ts : ts}`;
                }
            };
        }

        function updatePlayButton(playing) {
            const btn = document.getElementById('playBtn');
            const icon = document.getElementById('playIcon');
            btn.disabled = false;
            icon.className = playing ? 'fas fa-pause' : 'fas fa-play';
        }

        document.getElementById('playBtn').onclick = () => {
            if(!activeAudio) return;
            if(activeAudio.paused) {
                activeAudio.play();
                updatePlayButton(true);
            } else {
                activeAudio.pause();
                updatePlayButton(false);
            }
        };
    </script>
</body>
</html>
